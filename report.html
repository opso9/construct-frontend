<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Run-Report – Bauprojekt-Intelligence</title>
  <style>
:root { --bg:#0d1b2a;--bg2:#1a2e42;--accent:#22d3ee;--text:rgba(255,255,255,.85);--muted:rgba(255,255,255,.5); }
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:62.5%;background:var(--bg);}
body{font-family:"Inter",-apple-system,sans-serif;font-size:1.5rem;color:var(--text);line-height:1.6;}
.site-header{background:var(--bg2);padding:2rem 4rem;border-bottom:1px solid rgba(34,211,238,.15);display:flex;justify-content:space-between;align-items:center;}
.site-header h1{font-size:2rem;font-weight:700;color:var(--accent);}
.site-header a{color:var(--accent);font-size:1.3rem;}
.container{max-width:1100px;margin:0 auto;padding:3rem 4rem;}
.stats{display:flex;gap:2rem;margin-bottom:3rem;flex-wrap:wrap;}
.stat{background:var(--bg2);border-radius:8px;padding:1.5rem 2rem;min-width:130px;}
.stat__value{font-size:2.8rem;font-weight:700;color:var(--accent);}
.stat__label{color:var(--muted);font-size:1.2rem;}
h2{font-size:1.8rem;font-weight:700;margin-bottom:1.5rem;color:var(--accent);}
.run-card{background:var(--bg2);border-radius:8px;padding:2rem;margin-bottom:1.5rem;border:1px solid rgba(34,211,238,.1);}
.run-card__header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem;}
.run-card__date{font-weight:700;font-size:1.5rem;}
.run-card__meta{display:flex;gap:1.5rem;color:var(--muted);font-size:1.3rem;}
.run-card__meta span{color:var(--accent);font-weight:700;}
.collector-table{width:100%;border-collapse:collapse;font-size:1.3rem;}
.collector-table td,.collector-table th{padding:.4rem .8rem;text-align:left;}
.collector-table th{color:var(--muted);font-weight:400;border-bottom:1px solid rgba(255,255,255,.08);}
.collector-table .ok{color:#4ade80;}.collector-table .err{color:#f87171;}
.bar{height:6px;background:rgba(255,255,255,.1);border-radius:3px;margin-top:.3rem;}
.bar-fill{height:6px;background:var(--accent);border-radius:3px;}
@media(max-width:600px){.site-header,.container{padding:1.5rem;}}
</style>
</head>
<body>
<header class="site-header">
  <div><h1>Bauprojekt-Intelligence · Run-Report</h1></div>
  <a href="index.html">← Zurück zur Daten-Übersicht</a>
</header>
<main class="container">
  <div class="stats">
    <div class="stat"><div class="stat__value">1</div><div class="stat__label">Läufe gesamt</div></div>
    <div class="stat"><div class="stat__value">0</div><div class="stat__label">Neue Einträge</div></div>
    <div class="stat"><div class="stat__value">4.1s</div><div class="stat__label">Ø Laufzeit</div></div>
    <div class="stat"><div class="stat__value" style="font-size:1.6rem">26. Mar 2026 21:19</div><div class="stat__label">Letzter Lauf</div></div>
  </div>
  <h2>Letzte 30 Läufe</h2>
  
    <div class="run-card">
      <div class="run-card__header">
        <span class="run-card__date">26. Mar 2026 21:19</span>
        <div class="run-card__meta">
          <div>Neu: <span>0</span></div>
          <div>Dedup: <span>0</span></div>
          <div>Dauer: <span>4.1s</span></div>
          <div>Gesamt: <span>314</span></div>
        </div>
      </div>
      <p style="color:var(--muted)">Keine Collector-Daten</p>
    </div>
</main>
<footer style="text-align:center;padding:2rem;color:var(--muted);font-size:1.2rem">Stand: 26.03.2026 21:47 UTC</footer>
</body></html>
